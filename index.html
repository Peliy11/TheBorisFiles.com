<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheDeadBoris Files</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #ff3e3e;
            text-shadow: 2px 2px #000;
        }

        #countdown {
            font-size: 5rem;
            font-weight: bold;
            border-top: 2px solid #333;
            padding-top: 20px;
        }

        .glitch {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <h1 class="glitch">THEDEADBORIS FILES</h1>
    <div id="countdown">24:00:00</div>

<script>
    const COUNTDOWN_DURATION = 24 * 60 * 60 * 1000; // 24 hours in milliseconds
    const countdownElement = document.getElementById('countdown');

    // 1. Check if a start time already exists in the browser's memory
    let startTime = localStorage.getItem('boris_files_start_time');

    if (!startTime) {
        // 2. If not, set the start time to "Now" and save it
        startTime = Date.now();
        localStorage.setItem('boris_files_start_time', startTime);
    }

    const timer = setInterval(() => {
        const now = Date.now();
        const elapsed = now - startTime;
        const remaining = COUNTDOWN_DURATION - elapsed;

        if (remaining <= 0) {
            clearInterval(timer);
            countdownElement.innerHTML = "00:00:00";
            // Optional: localStorage.removeItem('boris_files_start_time'); 
            // ^ Uncomment above to reset the timer on the next refresh after it hits zero.
            return;
        }

        // Calculate hours, minutes, seconds
        const hours = Math.floor((remaining / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((remaining / (1000 * 60)) % 60);
        const seconds = Math.floor((remaining / 1000) % 60);

        // Update the display
        countdownElement.innerHTML = 
            `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }, 1000);
</script>
